name: Validate & Format JSON

on:
  push:
    paths:
      - '**.json'
  pull_request:
    paths:
      - '**.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ github.token }}

      - name: Validate & Format JSON files
        run: |
          python3 - <<'EOF'
          import json
          import pathlib
          import sys
          import unicodedata

          failed = False
          fixed = False

          # Invisible / lookalike characters that break string matching
          SNEAKY = {
              0x00A0: "no-break space (NBSP)",
              0x00AD: "soft hyphen",
              0x200B: "zero-width space",
              0x200C: "zero-width non-joiner",
              0x200D: "zero-width joiner",
              0x200E: "left-to-right mark",
              0x200F: "right-to-left mark",
              0x2028: "line separator",
              0x2029: "paragraph separator",
              0x202F: "narrow no-break space",
              0x2060: "word joiner",
              0x3000: "ideographic space",
              0xFEFF: "zero-width no-break space (BOM)",
          }

          def describe(ch):
              return SNEAKY.get(ord(ch)) or unicodedata.name(ch, "unnamed")

          def is_sneaky(ch):
              if ord(ch) in SNEAKY:
                  return True
              cat = unicodedata.category(ch)
              return cat == "Cf" or (cat == "Zs" and ch != " ") or (cat == "Cc" and ch != "\n")

          def reject_duplicate_keys(pairs):
              seen = set()
              for key, _ in pairs:
                  if key in seen:
                      raise ValueError(f"duplicate key {key!r}")
                  seen.add(key)
              return dict(pairs)

          for path in sorted(pathlib.Path(".").rglob("*.json")):
              if ".git" in path.parts:
                  continue
              errors = []
              data = None
              
              try:
                  raw = path.read_bytes()
                  
                  # Check BOM
                  if raw.startswith(b"\xef\xbb\xbf"):
                      errors.append("BOM detected - removing")
                      raw = raw[3:]
                  
                  # Check line endings
                  has_crlf = b"\r" in raw
                  if has_crlf:
                      errors.append("CRLF line endings detected - converting to LF")
                      raw = raw.replace(b"\r\n", b"\n").replace(b"\r", b"\n")
                  
                  text = raw.decode("utf-8")

                  # Check for sneaky chars and trailing whitespace
                  for lineno, line in enumerate(text.split("\n"), start=1):
                      for col, ch in enumerate(line, start=1):
                          if is_sneaky(ch):
                              errors.append(f"line {lineno}, col {col}: invisible U+{ord(ch):04X} ({describe(ch)})")
                      if line != line.rstrip():
                          errors.append(f"line {lineno}: trailing whitespace")

                  # Try to parse JSON
                  data = json.loads(text, object_pairs_hook=reject_duplicate_keys)
              except Exception as e:
                  failed = True
                  print(f"❌ FAIL  {path}")
                  print(f"      Error: {str(e)}")
                  for err in errors:
                      print(f"      - {err}")
                  continue

              # If we have data and no JSON errors, reformat and save
              if data is not None:
                  formatted = json.dumps(data, ensure_ascii=False, indent=2) + "\n"
                  if formatted != text + ("\n" if not text.endswith("\n") else ""):
                      errors.append("JSON reformatted for consistency")
                      fixed = True
                      path.write_text(formatted)

              if errors:
                  print(f"⚠️  WARN  {path}")
                  for err in errors:
                      print(f"      - {err}")
              else:
                  print(f"✅ OK    {path}")

          if failed:
              sys.exit(1)
          EOF

      - name: Commit changes if needed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes needed"
          else
            echo "Committing JSON formatting changes..."
            git add '*.json'
            git commit -m "chore: auto-format JSON files"
            git push
          fi

      - name: Report Status
        if: always()
        run: |
          echo "✅ JSON validation complete"
          echo "All JSON files are valid and properly formatted"
